# HelpTree pre-commit hooks
# Install: pip install pre-commit && pre-commit install

repos:
  # Generic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # Rust
  - repo: local
    hooks:
      - id: rust-fmt
        name: rust fmt
        entry: bash -c 'cd rust && cargo fmt --check'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false

      - id: rust-clippy
        name: rust clippy
        entry: bash -c 'cd rust && cargo clippy -- -D warnings'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false

      - id: rust-test
        name: rust test
        entry: bash -c 'cd rust && cargo test'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false

  # Python
  - repo: local
    hooks:
      - id: python-compile
        name: python compileall
        entry: python -m compileall
        language: system
        files: ^python/.*\.py$

  # TypeScript
  - repo: local
    hooks:
      - id: tsc
        name: tsc --noEmit
        entry: bash -c 'cd typescript && npx tsc --noEmit'
        language: system
        files: ^typescript/.*\.ts$
        pass_filenames: false

  # Go
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd go && test -z "$(gofmt -l .)"'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: bash -c 'cd go && go vet ./...'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false

      - id: go-build
        name: go build
        entry: bash -c 'cd go && go build ./...'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false

  # C#
  - repo: local
    hooks:
      - id: dotnet-build
        name: dotnet build
        entry: bash -c 'cd csharp && dotnet build --no-restore'
        language: system
        files: ^csharp/.*\.cs$
        pass_filenames: false

  # Swift
  - repo: local
    hooks:
      - id: swift-build
        name: swift build
        entry: bash -c 'cd swift && swift build'
        language: system
        files: ^swift/.*\.swift$
        pass_filenames: false

  # Nim
  - repo: local
    hooks:
      - id: nim-check
        name: nim check
        entry: bash -c 'cd nim && for f in src/*.nim; do nim check "$f"; done'
        language: system
        files: ^nim/.*\.nim$
        pass_filenames: false

  # Crystal
  - repo: local
    hooks:
      - id: crystal-format
        name: crystal tool format --check
        entry: bash -c 'cd crystal && crystal tool format --check'
        language: system
        files: ^crystal/.*\.cr$
        pass_filenames: false

  # Ruby
  - repo: local
    hooks:
      - id: ruby-syntax
        name: ruby -c
        entry: bash -c 'ruby -c'
        language: system
        files: ^ruby/.*\.rb$

  # Zig
  - repo: local
    hooks:
      - id: zig-fmt
        name: zig fmt --check
        entry: bash -c 'cd zig && zig fmt --check src/'
        language: system
        files: ^zig/.*\.zig$
        pass_filenames: false

  # Haskell
  - repo: local
    hooks:
      - id: stack-build
        name: stack build
        entry: bash -c 'source ~/.zshrc 2>/dev/null; export PATH="$HOME/.ghcup/bin:$PATH"; cd haskell && stack build'
        language: system
        files: ^haskell/.*\.hs$
        pass_filenames: false
